    // Constants
    const XP_LEVELS = [0, 300, 750, 1500, 2500, 4000, 6000, 8500, 11500, 15000, 19000, 24000, 30000, 37000, 45000, 54000, 64000, 75000, 85000];

    const USERS = {

    };

    let currentUser = null;
    let currentSubject = 'physics';
    let isSyncing = false;
    let dataListener = null;
    const STORAGE_KEY = 'studyRPG_SharedData_v1';

    let gameData = {
        partnerA: { xp: 0, level: 1, tasks: {} },
        partnerB: { xp: 0, level: 1, tasks: {} }
    };

    const CHAPTERS = {

                { name: "Gravitation", desc: "Kepler's laws, Escape velocity.", behemoth: false },

            ],

                { name: "Electrostatic Potential", desc: "Capacitors, Dielectrics.", behemoth: false },
                { name: "Current Electricity", desc: "Kirchhoff's laws, Wheatstone bridge.", behemoth: true },

            ],

        },

    };

    // ==========================================
    // GLOBAL EXPOSURE (CRITICAL FIX)
    // ==========================================

    window.showSubject = function(subject) {
        currentSubject = subject;
        const tabs = document.querySelectorAll('.subject-tab');
        tabs.forEach(tab => tab.classList.remove('active'));
        if (event && event.target) event.target.classList.add('active');
        window.loadChapters();
    };

    window.loadChapters = function() {
        const container = document.getElementById('chaptersContainer');
        const subjectData = CHAPTERS[currentSubject];
        let html = '';

        for (const [className, chapters] of Object.entries(subjectData)) {
            const classTitle = className === 'class11' ? 'Class 11' : 'Class 12';
            html += `<div class="class-section"><h2 class="class-header">${classTitle}</h2>`;
            chapters.forEach((chapter, index) => {
                const chapterId = `${currentSubject}_${className}_${index}`;
                html += renderChapter(chapter, chapterId);
            });
            html += '</div>';
        }
        container.innerHTML = html;
    };

    function renderChapter(chapter, chapterId) {
        const behemothBadge = chapter.behemoth ? '<span class="behemoth-badge">BEHEMOTH 1.5x</span>' : '';
        return `
            <div class="chapter-item">
                <div class="chapter-header" onclick="window.toggleChapter('${chapterId}')">
                    <div class="chapter-title">${behemothBadge} ${chapter.name}</div>
                    <div class="chapter-toggle" id="toggle_${chapterId}">▼</div>
                </div>
                <div class="chapter-content" id="content_${chapterId}">
                    <div class="chapter-tasks">
                        <div style="color: #a0aec0; margin-bottom: 15px; font-size: 14px;">${chapter.desc}</div>
                        ${renderTask(chapterId, 'concept', 'Topic Concept', chapter.behemoth)}
                        ${renderTask(chapterId, 'ncert', 'NCERT Exercises', chapter.behemoth)}
                        ${renderTask(chapterId, 'pyq', 'PYQ Conquest', chapter.behemoth)}
                        ${renderTask(chapterId, 'legend', 'Chapter Legend', chapter.behemoth)}
                    </div>
                </div>
            </div>`;
    }

    function renderTask(chapterId, taskType, taskName, behemoth) {
        const xp = TASK_XP[taskType];
        const multipliedXP = behemoth ? Math.floor(xp * 1.5) : xp;
        const taskId = `${chapterId}_${taskType}`;
        const checked = gameData[currentUser]?.tasks?.[taskId] ? 'checked' : '';
        return `
            <div class="task-item">
                <div class="task-checkbox">
                    <input type="checkbox" id="${taskId}" ${checked} onchange="window.toggleTask('${taskId}', ${multipliedXP})">
                    <label for="${taskId}">${taskName}</label>
                </div>
                <div class="task-xp">+${multipliedXP} XP</div>
            </div>`;
    }

    window.toggleChapter = function(chapterId) {
        document.getElementById('content_' + chapterId).classList.toggle('open');
        document.getElementById('toggle_' + chapterId).classList.toggle('open');
    };

    window.toggleTask = async function(taskId, xp) {
        const checkbox = document.getElementById(taskId);
        const oldLevel = calculateLevel(gameData[currentUser].xp);

        if (checkbox.checked) {
            gameData[currentUser].tasks[taskId] = true;
            gameData[currentUser].xp += xp;
        } else {
            delete gameData[currentUser].tasks[taskId];
            gameData[currentUser].xp -= xp;
        }

        if (calculateLevel(gameData[currentUser].xp) > oldLevel) showLevelUp(calculateLevel(gameData[currentUser].xp));
        
        await saveToFirebase();
        updateDashboard();
    };

    window.logout = function() {
        currentUser = null;
        document.getElementById('loginContainer').style.display = 'block';
        document.getElementById('appContainer').classList.remove('active');
    };

    // Helper Functions
    function calculateLevel(xp) {
        for (let i = XP_LEVELS.length - 1; i >= 0; i--) if (xp >= XP_LEVELS[i]) return i + 1;
        return 1;
    }

    function updateDashboard() {
        ['partnerA', 'partnerB'].forEach(p => {
            const level = calculateLevel(gameData[p].xp);
            const nextXP = XP_LEVELS[level] || XP_LEVELS[18];
            const prevXP = level > 1 ? XP_LEVELS[level-1] : 0;
            const progress = ((gameData[p].xp - prevXP) / (nextXP - prevXP)) * 100;
            
            document.getElementById('level' + p.slice(-1)).textContent = level;
            document.getElementById('xpBar' + p.slice(-1)).style.width = progress + '%';
            document.getElementById('xpText' + p.slice(-1)).textContent = `${gameData[p].xp} / ${nextXP} XP`;
        });

        document.getElementById('teamLevel').textContent = calculateLevel(gameData.partnerA.xp + gameData.partnerB.xp);
        document.getElementById('teamXP').textContent = gameData.partnerA.xp + gameData.partnerB.xp;
    }

    async function saveToFirebase() {
        if (!isFirebaseConnected) return;
        updateSyncStatus(true, 'syncing');
        await set(ref(database, 'studyRPG/gameData'), gameData);
        updateSyncStatus(true, 'saved');
    }

    function updateSyncStatus(success, type) {
        const statusApp = document.getElementById('syncStatusApp');
        if (!statusApp) return;
        statusApp.className = `sync-status ${type === 'syncing' ? 'syncing' : success ? 'online' : 'offline'}`;
        statusApp.textContent = type === 'syncing' ? '🔄 Syncing...' : success ? '✅ Synced' : '⚠️ Offline';
    }

    function showLevelUp(level) {
        const overlay = document.getElementById('levelUpOverlay');
        document.getElementById('levelUpNumber').textContent = level;
        overlay.classList.add('show');
        setTimeout(() => overlay.classList.remove('show'), 3000);
    }

    // Login logic
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const user = document.getElementById('username').value;
        const pass = document.getElementById('password').value;
        if (USERS[user] && USERS[user].password === pass) {
            currentUser = user;
            document.getElementById('loginContainer').style.display = 'none';
            document.getElementById('appContainer').classList.add('active');
            
            // Initial Data Load
            const snapshot = await get(ref(database, 'studyRPG/gameData'));
            if (snapshot.exists()) gameData = snapshot.val();
            
            updateDashboard();
            window.loadChapters();
        } else {
            alert('Wrong credentials');
        }
    });
</script>
